# Service MUST be named "api" — the frontend nginx.conf uses
# proxy_pass http://api:8000 which resolves via K8s DNS.
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: chronocanvas
  labels:
    app.kubernetes.io/part-of: chronocanvas
    app.kubernetes.io/component: api
spec:
  selector:
    app.kubernetes.io/part-of: chronocanvas
    app.kubernetes.io/component: api
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
  type: ClusterIP
