apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: chronocanvas-data
  namespace: chronocanvas
  labels:
    app.kubernetes.io/part-of: chronocanvas
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  # Uses the default StorageClass (standard-rwo on GKE Autopilot).
  # To scale API beyond 1 replica, switch to a ReadWriteMany StorageClass
  # (e.g., Filestore: filestore.csi.storage.gke.io).
