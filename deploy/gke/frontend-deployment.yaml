apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: chronocanvas
  labels:
    app.kubernetes.io/part-of: chronocanvas
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/part-of: chronocanvas
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: chronocanvas
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: us-docker.pkg.dev/PROJECT_ID/chronocanvas/frontend:SHA
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
              ephemeral-storage: "32Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
              ephemeral-storage: "64Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
