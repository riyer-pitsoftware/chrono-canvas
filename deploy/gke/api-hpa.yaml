# NOTE: Scaling beyond 1 replica requires switching data-pvc.yaml to
# a ReadWriteMany StorageClass (e.g., Filestore). With the default
# ReadWriteOnce PVC, keep maxReplicas at 1.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-hpa
  namespace: chronocanvas
  labels:
    app.kubernetes.io/part-of: chronocanvas
    app.kubernetes.io/component: api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api
  minReplicas: 1
  maxReplicas: 1
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
