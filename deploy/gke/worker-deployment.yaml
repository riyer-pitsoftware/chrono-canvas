apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: chronocanvas
  labels:
    app.kubernetes.io/part-of: chronocanvas
    app.kubernetes.io/component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/part-of: chronocanvas
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: chronocanvas
        app.kubernetes.io/component: worker
    spec:
      serviceAccountName: chronocanvas-sa
      containers:
        - name: worker
          image: us-docker.pkg.dev/PROJECT_ID/chronocanvas/api:SHA
          command:
            - arq
            - chronocanvas.worker.WorkerSettings
          envFrom:
            - configMapRef:
                name: chronocanvas-config
            - secretRef:
                name: chronocanvas-secrets
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
              ephemeral-storage: "256Mi"
            limits:
              cpu: "2"
              memory: "4Gi"
              ephemeral-storage: "1Gi"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: chronocanvas-data
