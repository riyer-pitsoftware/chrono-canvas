# Baseline A — One-shot T2I (minimal prompt)
#
# Single ComfyUI image generation call. Minimal prompt formatting from case
# metadata (title + period + region). No ChronoCanvas pipeline involved.
#
# Executed by: eval/scripts/direct_comfyui.py --condition A

condition: baselineA_oneshot_minimal
description: >
  Lowest-effort baseline. Single image generation call with minimal prompt
  formatting. No research, no validation, no face pipeline.

mode: direct  # "direct" = direct_comfyui.py, "pipeline" = ChronoCanvas API

prompt_strategy: minimal
# Template: "Portrait of {title}, {time_period_label}, {region}"

image_generation:
  provider: comfyui
  model: sdxl
  checkpoint: juggernautXL_v9.safetensors
  width: 768
  height: 1024
  sampler: dpmpp_2m
  steps: 30
  cfg: 7.0
  seed: null  # Set per-run or use case seed_recommendation

pipeline:
  orchestration_enabled: false
  research_enabled: false
  prompt_decomposition_enabled: false
  validation_retry_enabled: false
  face_search_enabled: false
  facefusion_enabled: false
  audit_trail_enabled: false
  max_retries: 0

llm:
  provider: null
  model: null
