# Baseline B — One-shot T2I (human-refined prompt)
#
# Single ComfyUI image generation call. Human-refined prompt with style cues,
# era details, and setting context from case metadata. No pipeline involved.
#
# Executed by: eval/scripts/direct_comfyui.py --condition B

condition: baselineB_oneshot_improved
description: >
  Fairer baseline versus naive one-shot. Human-refined prompt template adds
  style guidance, era cues, and setting context. No research, no validation,
  no face pipeline.

mode: direct

prompt_strategy: human_refined
# Template: "A historically informed oil painting portrait of {title},
#   {region}, circa {start}–{end}, in a {setting} setting,
#   period-appropriate attire and cultural markers, {style_guidance},
#   detailed face, clear features, dignified composition"

image_generation:
  provider: comfyui
  model: sdxl
  checkpoint: juggernautXL_v9.safetensors
  width: 768
  height: 1024
  sampler: dpmpp_2m
  steps: 30
  cfg: 7.0
  seed: null

pipeline:
  orchestration_enabled: false
  research_enabled: false
  prompt_decomposition_enabled: false
  validation_retry_enabled: false
  face_search_enabled: false
  facefusion_enabled: false
  audit_trail_enabled: false
  max_retries: 0

llm:
  provider: null
  model: null
