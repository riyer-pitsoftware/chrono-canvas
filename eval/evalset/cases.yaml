  - id: CCV1-011
    title: "Mansa Musa, Emperor of Mali"
    subject_type: named_figure
    region: "West Africa, Mali Empire"
    time_period_label: "14th Century Mali Empire"
    time_period_start: 1280
    time_period_end: 1337
    setting_context: "Royal court or pilgrimage caravan"
    evidence_level: low
    intended_output_type: portrait
    prompt_brief: >
      A historically informed portrait of Mansa Musa, ruler of the Mali Empire
      and famed for the 1324 hajj pilgrimage. He should be depicted in West
      African royal attire — flowing robes (boubou/grand boubou), gold jewelry,
      and a royal cap or turban reflecting Islamic and Mande cultural fusion.
    must_include:
      - "flowing robes (boubou or similar West African garment)"
      - "gold jewelry or regalia"
      - "human face clearly visible"
      - "royal headwear (cap or turban)"
    must_not_include:
      - "European crown or scepter"
      - "Egyptian pharaonic imagery"
      - "modern suit or military uniform"
      - "East African Maasai elements"
    style_guidance:
      - "illustrative realism"
      - "gold and earth-tone palette"
      - "emphasis on wealth and imperial dignity"
    anachronism_watchlist:
      - "European medieval crown"
      - "printed fabric (pre-dates period)"
      - "modern gold coins or bars"
      - "North African Berber attire conflated"
    uncertainty_notes: >
      No contemporary portrait survives. The Catalan Atlas (1375) contains a
      stylized depiction by a European cartographer. Clothing and material culture
      reconstructed from oral traditions, Arabic accounts (Ibn Battuta), and
      archaeological evidence. Evaluate plausibility, not exact likeness.
    reference_notes:
