  - id: CCV1-004
    title: "Chalukya Court Investigator"
    subject_type: archetype
    region: "Deccan, India"
    time_period_label: "Early Medieval India"
    time_period_start: 600
    time_period_end: 800
    setting_context: "Courtly/administrative"
    evidence_level: low
    intended_output_type: portrait
    prompt_brief: >
      A historically informed portrait of a royal investigator in the court of a
      Chalukya king. The figure should wear period-appropriate textiles — cotton
      or silk dhoti and uttariya (upper drape), with minimal ornaments befitting
      an administrative role rather than royalty. Setting should suggest a stone
      court or pillared hall with Chalukyan architectural motifs.
    must_include:
      - "period-appropriate textiles (non-modern weave appearance)"
      - "courtly but practical attire"
      - "human face clearly visible"
      - "Deccan-region cultural markers"
    must_not_include:
      - "modern buttons or zippers"
      - "modern eyewear"
      - "photographic studio lighting artifacts"
      - "modern military insignia"
      - "Mughal-era clothing (too late)"
    style_guidance:
      - "illustrative realism"
      - "period-plausible color palette"
      - "stone and textile textures"
    anachronism_watchlist:
      - "wristwatch"
      - "necktie"
      - "polyester sheen"
      - "modern police badge"
      - "Mughal jama or turban"
    uncertainty_notes: >
      There is no ground-truth portrait. Chalukyan sculpture and temple reliefs
      provide some clothing/ornament references. Evaluate plausibility and
      coherence, not exact likeness.
    reference_notes:
      - "Badami and Aihole cave temple reliefs for clothing cues"
      - "General early medieval Deccan material culture"
    scorable_dimensions:
      - prompt_adherence
      - visual_coherence
      - face_usability
      - period_plausibility
      - anachronism_avoidance
      - narrative_image_consistency
      - uncertainty_signaling_quality
      - audit_trace_completeness

  - id: CCV1-005
