  - id: CCV1-013
    title: "Pachacuti Inca Yupanqui, Inca Emperor"
    subject_type: named_figure
    region: "Andes, Inca Empire (modern Peru)"
    time_period_label: "15th Century Inca Empire"
    time_period_start: 1418
    time_period_end: 1471
    setting_context: "Cusco palace or mountain fortress"
    evidence_level: low
    intended_output_type: portrait
    prompt_brief: >
      A historically informed portrait of Pachacuti, the Inca emperor who
      transformed Cusco and expanded the Tawantinsuyu. He should wear an
      uncu (tunic) with geometric tocapu patterns, a llautu (royal headband)
      with mascaipacha (royal fringe), and large gold ear spools (orejones).
    must_include:
      - "uncu tunic with tocapu geometric patterns"
      - "llautu headband with mascaipacha fringe"
      - "gold ear spools"
      - "human face clearly visible"
    must_not_include:
      - "Aztec or Maya iconography"
      - "European crown"
      - "feathered headdress (Plains Native American style)"
      - "modern textiles"
    style_guidance:
      - "illustrative realism"
      - "Andean earth tones with gold accents"
      - "emphasis on textile patterns"
    anachronism_watchlist:
      - "Spanish colonial elements"
      - "steel weapons or armor"
      - "printed or dyed fabric (vs woven)"
      - "Aztec jade or obsidian motifs"
    uncertainty_notes: >
