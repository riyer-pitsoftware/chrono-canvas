name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Config drift check ──────────────────────────────────────────────────────
  config-drift:
    name: Config drift (.env.example ↔ config.py)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate .env.example matches config.py Settings
        run: python scripts/check_env_keys.py

  # ── Backend ─────────────────────────────────────────────────────────────────
  backend-lint:
    name: Backend lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend
        run: pip install -e "backend[dev]"
      - name: Lint
        run: cd backend && ruff check src/ tests/

  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite+aiosqlite:///test.db
      REDIS_URL: redis://localhost:6379/1
      IMAGE_PROVIDER: mock
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend
        run: pip install -e "backend[dev]"
      - name: Test
        run: |
          cd backend && pytest -v \
            --ignore=../tests/test_agents/test_face_swap.py \
            --ignore=../tests/test_db

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend-check:
    name: Frontend lint + type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Lint
        run: cd frontend && npm run lint
      - name: Type check
        run: cd frontend && npx tsc --noEmit
