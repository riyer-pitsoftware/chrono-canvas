services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: chronocanvas
      POSTGRES_PASSWORD: chronocanvas
      POSTGRES_DB: chronocanvas
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chronocanvas"]
      interval: 5s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://chronocanvas:chronocanvas@db:5432/chronocanvas
      REDIS_URL: redis://redis:6379/0
      COMFYUI_API_URL: http://host.docker.internal:8188
      PYTHONPATH: /app/src:/app/neo-mumbai-noir
      RUN_MIGRATIONS: "true"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - output:/app/output
      - archive:/app/archive
      - uploads:/app/uploads
      - ../neo-mumbai-noir:/app/neo-mumbai-noir
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://chronocanvas:chronocanvas@db:5432/chronocanvas
      REDIS_URL: redis://redis:6379/0
      PYTHONPATH: /app/src:/app/neo-mumbai-noir
      RUN_MIGRATIONS: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - output:/app/output
      - archive:/app/archive
      - uploads:/app/uploads
      - ../neo-mumbai-noir:/app/neo-mumbai-noir
    command: ["arq", "chronocanvas.worker.WorkerSettings"]
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "3000:8080"
    depends_on:
      - api
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp

volumes:
  pgdata:
  output:
  archive:
  uploads:

