services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: historylens
      POSTGRES_PASSWORD: historylens
      POSTGRES_DB: historylens
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - db-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U historylens"]
      interval: 5s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - db-net
      - worker-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://historylens:historylens@db:5432/historylens
      REDIS_URL: redis://redis:6379/0
      COMFYUI_API_URL: http://host.docker.internal:8188
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - frontend-net
      - db-net
      - worker-net
      - llm-net
    volumes:
      - output:/app/output
      - uploads:/app/uploads
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "3000:8080"
    depends_on:
      - api
    networks:
      - frontend-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp

volumes:
  pgdata:
  output:
  uploads:

networks:
  frontend-net:
  worker-net:
  db-net:
  llm-net:
